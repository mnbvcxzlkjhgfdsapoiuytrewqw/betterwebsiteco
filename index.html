<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Better Website Co. — Websites That Sell.</title>
    <meta name="description" content="Premium websites designed to turn visitors into paying customers." />
    <meta property="og:title" content="Better Website Co. — Websites That Sell." />
    <meta property="og:description" content="Premium websites designed to turn visitors into paying customers." />
    <meta property="og:image" content="/favicon.png" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('bwc-theme');
          var theme = saved === 'light' || saved === 'dark'
            ? saved
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Static form so Netlify's build-time bot detects and provisions this form.
         The real, styled form in React submits to this same form name via fetch. -->
    <form name="inquiry" data-netlify="true" netlify-honeypot="company" hidden>
      <input type="text" name="name" />
      <input type="text" name="business" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="tier" />
      <textarea name="details"></textarea>
      <textarea name="goals"></textarea>
      <input type="text" name="timeline" />
      <input type="text" name="integrations" />
      <textarea name="requirements"></textarea>
      <input type="text" name="company" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
